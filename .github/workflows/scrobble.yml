---
name: Scrobble YT Music History

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

defaults:
  run:
    shell: sh

jobs:
  scrobble:
    name: Scrobble
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v7
        with:
          persist-credentials: "true"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version-file: "pyproject.toml"

      - name: Install dependencies
        run: make install

      - name: Write browser.json from secret
        env:
          YTM_BROWSER: "${{ secrets.YTM_BROWSER }}"
        run: echo "${YTM_BROWSER}" > browser.json

      - name: Run scrobble script
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
          LASTFM_PASSWORD: ${{ secrets.LASTFM_PASSWORD }}
        run: make run

      - name: Commit updated snapshot and log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_snapshot.json runs.log
          git diff --staged --quiet || git commit -m "chore: update snapshot"
          git push
